name: "Wrightful PR Comment"
description: "Posts a PR comment with Playwright test run summary and link to dashboard"
inputs:
  api-url:
    description: "Wrightful dashboard URL"
    required: true
  api-key:
    description: "Wrightful API key"
    required: true
runs:
  using: "node20"
  main: "dist/index.js"
