# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "wrightful"

[setup]
script = "pnpm install --frozen-lockfile"

[cleanup]
script = "node -e \"require('node:fs').rmSync('apps/dashboard/node_modules/.vite', { recursive: true, force: true })\""

[[actions]]
name = "Dev server"
icon = "run"
command = "pnpm dev"

[[actions]]
name = "Tests"
icon = "test"
command = "pnpm test"

[[actions]]
name = "Typecheck"
icon = "tool"
command = "pnpm --filter @wrightful/dashboard typecheck && pnpm --filter @wrightful/reporter typecheck"

[[actions]]
name = "Lint"
icon = "tool"
command = "pnpm exec vp check --no-fmt"

[[actions]]
name = "Set up local data"
icon = "debug"
command = "pnpm setup:local"
