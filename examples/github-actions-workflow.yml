name: Playwright Tests

# Configure @wrightful/reporter in playwright.config.ts so results stream
# into the dashboard live as tests complete:
#
#   // playwright.config.ts
#   reporter: [['list'], ['@wrightful/reporter']],
#
# The WRIGHTFUL_URL / WRIGHTFUL_TOKEN env vars below are read by the
# reporter at onBegin. Shards converge on a single run via a deterministic
# idempotency key derived from GITHUB_RUN_ID.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shard }}
        env:
          WRIGHTFUL_URL: ${{ secrets.WRIGHTFUL_URL }}
          WRIGHTFUL_TOKEN: ${{ secrets.WRIGHTFUL_TOKEN }}
