name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The dashboard's tsconfig extends the Void-generated .void/tsconfig.json;
      # generate it before any type-aware lint/typecheck.
      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      # Redirect `vp check`'s output to a file rather than letting it stream to
      # the CI capture pipe. Vite+ floods stdout with lint diagnostics from
      # parallel worker threads, and on the runner that pipe breaks mid-write —
      # the Rust binary then panics in std `io/stdio.rs` ("failed printing to
      # stdout") and aborts with exit 134 ("Vite+ panicked. This is a bug in
      # Vite+, not your code."), regardless of whether there are real lint
      # errors. Writing to a regular file removes the pipe (a file write can't
      # EPIPE); we then print the captured output and preserve the real exit
      # code so genuine format/lint/type errors still fail the job.
      - name: Check (format, lint, typecheck)
        run: |
          pnpm check > check-output.log 2>&1 || code=$?
          cat check-output.log
          exit "${code:-0}"

  test-reporter:
    name: Reporter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The reporter's wire-contract test imports the dashboard's schemas,
      # whose tsconfig extends .void/tsconfig.json — generate it first.
      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      - name: Run reporter tests with coverage
        run: pnpm --filter @wrightful/reporter test:coverage

      - name: Upload reporter coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reporter
          path: packages/reporter/coverage
          if-no-files-found: ignore

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      - name: Run dashboard tests with coverage
        run: pnpm --filter @wrightful/dashboard test:coverage

      - name: Upload dashboard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dashboard
          path: apps/dashboard/coverage
          if-no-files-found: ignore

  build-dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      # Production build gate: catches SSR/worker-bundle breakage (server/client
      # boundary errors, Rolldown bundling failures) that typecheck + unit tests
      # can't see. Cheap relative to shipping a broken `void deploy`.
      - name: Build dashboard
        run: pnpm --filter @wrightful/dashboard build

  # Playwright version canary: exercises the reporter against a live dashboard
  # shape (via the dogfood e2e suite). When Renovate bumps @playwright/test,
  # this job surfaces any format / reporter-API incompatibilities early.
  #
  # The fixtures boot the Void dashboard at apps/dashboard (.env.local +
  # `void db reset`); the suite is green (12/12) locally. Note: the harness
  # strips VITEST from the spawned dev server's env so the Void plugin (and
  # thus /api/auth + D1) stays enabled — see src/dashboard-fixture.ts.
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-reporter, test-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  # Browser-driven UI smoke against a locally booted dashboard. Catches
  # cross-cutting regressions (auth → navigation → run-detail) that the
  # API-level e2e and component RTL tests can't see. The fixtures boot the Void
  # dashboard at apps/dashboard (.env.local + `void db reset`); the suite is
  # green (35/35) locally. CI runs 3 workers + retries:2 to absorb timing flake.
  test-e2e-ui:
    name: E2E UI Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-reporter, test-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      - name: Run dashboard UI e2e tests
        # `vars.VISUAL_BASELINE_OK` (repo variable) flips visual.spec from
        # skipped to enforced. Inert until a maintainer commits Linux PNG
        # baselines (run `--update-snapshots` once on a Linux runner via
        # workflow_dispatch / `act`, commit the PNGs, then set the var to
        # "1" in repo settings). Until then, visual.spec self-skips.
        env:
          WRIGHTFUL_VISUAL_BASELINE_OK: ${{ vars.VISUAL_BASELINE_OK }}
        run: pnpm --filter @wrightful/e2e test:dashboard

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dashboard
          path: packages/e2e/playwright-report
          if-no-files-found: ignore
