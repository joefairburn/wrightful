name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `labeled` is included so applying the `CI` label to an open PR
    # re-triggers CI — the `dogfood-stream` job keys off that label. Without
    # it, the label would only take effect on the next push.
    types: [opened, synchronize, reopened, labeled]

jobs:
  lint-and-typecheck:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The dashboard's tsconfig extends the Void-generated .void/tsconfig.json;
      # generate it before any type-aware lint/typecheck.
      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      # Redirect `vp check`'s output to a file rather than letting it stream to
      # the CI capture pipe. Vite+ floods stdout with lint diagnostics from
      # parallel worker threads, and on the runner that pipe breaks mid-write —
      # the Rust binary then panics in std `io/stdio.rs` ("failed printing to
      # stdout") and aborts with exit 134 ("Vite+ panicked. This is a bug in
      # Vite+, not your code."), regardless of whether there are real lint
      # errors. Writing to a regular file removes the pipe (a file write can't
      # EPIPE); we then print the captured output and preserve the real exit
      # code so genuine format/lint/type errors still fail the job.
      - name: Check (format, lint, typecheck)
        run: |
          pnpm check > check-output.log 2>&1 || code=$?
          cat check-output.log
          exit "${code:-0}"

      # Schema/migration drift guard: `pnpm db:generate` (void db generate) must
      # be a no-op on a clean tree. If it isn't, someone edited db/schema.ts
      # without regenerating the migration. (`vp check` above typechecks the app
      # against the Postgres schema — the only backend.)
      - name: Schema/migration drift (db:generate must be a no-op)
        run: |
          pnpm --filter @wrightful/dashboard run db:generate
          paths="apps/dashboard/db/schema.ts apps/dashboard/db/migrations"
          if [ -n "$(git status --porcelain -- $paths)" ]; then
            echo "::error::Schema drift: run 'pnpm --filter @wrightful/dashboard db:generate' and commit the result."
            git status --porcelain -- $paths
            git --no-pager diff -- $paths
            exit 1
          fi
          echo "✓ db/migrations is in sync with db/schema.ts"

  test-reporter:
    name: Reporter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The reporter's wire-contract test imports the dashboard's schemas,
      # whose tsconfig extends .void/tsconfig.json — generate it first.
      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      - name: Run reporter tests with coverage
        run: pnpm --filter @wrightful/reporter test:coverage

      - name: Upload reporter coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reporter
          path: packages/reporter/coverage
          if-no-files-found: ignore

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      - name: Run dashboard tests with coverage
        run: pnpm --filter @wrightful/dashboard test:coverage

      # The workerd lane: server-side suites (`*.workers.test.ts`) run inside the
      # real Workers runtime via inline miniflare. It uses no `wrangler.configPath`
      # (no dependency on the gitignored, generated wrangler.jsonc), so it's
      # CI-safe with no extra infra. The Node `test:coverage` lane above excludes
      # this glob, so nothing double-runs.
      - name: Run dashboard tests in workerd
        run: pnpm --filter @wrightful/dashboard test:workers

      - name: Upload dashboard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dashboard
          path: apps/dashboard/coverage
          if-no-files-found: ignore

  # Real-Postgres integration leg. The pglite lane (in `test-dashboard`) is fast
  # but cannot reproduce node-postgres result shapes — most importantly int8
  # (`count`/`sum`/bigint) and `numeric` come back as STRINGS on the production
  # driver, numbers on pglite (see src/__tests__/pg-integration/). This job runs
  # the SAME suites against a real `postgres:16` service container via
  # `PG_TEST_URL`, so a result-shape/SQL divergence the surrogate hides fails CI
  # here. `pg` is already transitive (drizzle-orm/node-postgres), so no extra
  # dep. The directory's files share ONE database under `PG_TEST_URL`, and each
  # file drop+recreates its own tables independently — `--no-file-parallelism`
  # forces vitest to run them one at a time so concurrent DDL from different
  # files can't corrupt each other (the pglite default lane doesn't need this;
  # each file there gets its own fresh in-process instance).
  test-postgres:
    name: Postgres Integration (real engine)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wrightful
          POSTGRES_PASSWORD: wrightful
          POSTGRES_DB: wrightful_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wrightful"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      - name: Postgres integration test (real node-postgres)
        env:
          PG_TEST_URL: postgres://wrightful:wrightful@localhost:5432/wrightful_test
        run: pnpm --filter @wrightful/dashboard exec vp test run src/__tests__/pg-integration/ --no-file-parallelism

  build-dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      # Production build gate: catches SSR/worker-bundle breakage (server/client
      # boundary errors, Rolldown bundling failures) that typecheck + unit tests
      # can't see. Cheap relative to shipping a broken `void deploy`.
      - name: Build dashboard
        run: pnpm --filter @wrightful/dashboard build

  # Playwright version canary: exercises the reporter against a live dashboard
  # shape (via the dogfood e2e suite). When Renovate bumps @playwright/test,
  # this job surfaces any format / reporter-API incompatibilities early.
  #
  # The fixtures boot the Void dashboard at apps/dashboard (.env.local +
  # `void db reset`); the suite is green (12/12) locally. Note: the harness
  # strips VITEST from the spawned dev server's env so the Void plugin (and
  # thus /api/auth + D1) stays enabled — see src/dashboard-fixture.ts.
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-reporter, test-dashboard]
    # bootDashboard (src/dashboard-fixture.ts) runs `void db reset` + `vp dev`,
    # which need a Postgres to connect to. An ephemeral service container (same
    # pattern as test-postgres) gives a throwaway DB reachable only from inside
    # the runner — never point `void db reset` at a real DB, it wipes + remigrates.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wrightful
          POSTGRES_PASSWORD: wrightful
          POSTGRES_DB: wrightful_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wrightful"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          DATABASE_URL: postgres://wrightful:wrightful@localhost:5432/wrightful_test
        run: pnpm test:e2e

  # Dogfood: run the demo Playwright suite (tests/, playwright.config.ts — the
  # only suite wired with @wrightful/reporter) and stream its results to
  # production Wrightful so the prod dashboard fills with real run data.
  #
  # A dedicated, self-contained job — NOT a step in test-e2e — because:
  #   * the demo suite drives playwright.dev and streams to prod; it never boots
  #     a local dashboard, so it has no DATABASE_URL / `void db reset` dependency
  #     (unlike test-e2e's Vitest suite + test-e2e-dashboard, which do);
  #   * a streaming step buried after `pnpm test:e2e` inherits an implicit
  #     `success()` and is skipped whenever that (DB-dependent) step fails.
  # Isolating it means streaming runs on its own merits.
  #
  # Opt-in only: the job runs solely when a PR carries the `CI` label, so
  # nothing hits the prod dashboard unless a maintainer opts that PR in. The
  # reporter no-ops gracefully if the token is missing/wrong (logs + drops
  # results, exit 0), so a secret problem never reddens CI. Fork PRs can't
  # stream regardless (GitHub withholds secrets from forked-repo PR runs).
  dogfood-stream:
    name: Dogfood Stream (prod Wrightful)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'CI')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      # Run only demo.spec.ts — NOT the whole `tests/` dir. The sibling
      # visual-regression.spec.ts is a manual verification harness (it needs a
      # committed per-OS screenshot baseline; there's no Linux one, so it errors
      # "snapshot doesn't exist … homepage-linux.png" and reddens the job). The
      # reporter is configured at the playwright.config.ts level, so the demo
      # spec still streams its results regardless of which files run.
      - name: Stream demo suite to production Wrightful
        # The synthetic demo suite streams to a dedicated dogfood project
        # (WRIGHTFUL_DOGFOOD_TOKEN), kept separate from the real dashboard e2e
        # suite (test-e2e-dashboard), which uses WRIGHTFUL_TOKEN.
        env:
          WRIGHTFUL_URL: ${{ secrets.WRIGHTFUL_URL }}
          WRIGHTFUL_TOKEN: ${{ secrets.WRIGHTFUL_DOGFOOD_TOKEN }}
        run: pnpm --filter @wrightful/e2e exec playwright test tests/demo.spec.ts

  # Browser-driven UI smoke against a locally booted dashboard. Catches
  # cross-cutting regressions (auth → navigation → run-detail) that the
  # API-level e2e and component RTL tests can't see. The fixtures boot the Void
  # dashboard at apps/dashboard (.env.local + `void db reset`); the suite is
  # green locally. The suite runs one worker because every spec shares this one
  # app process and database; retries remain enabled to capture genuine flakes.
  test-e2e-dashboard:
    name: Dashboard E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-reporter, test-dashboard]
    # Throwaway Postgres for bootDashboard's `void db reset` + `vp dev` (see the
    # note on test-e2e). Dedicated `wrightful_e2e` DB — the guarded
    # `test:dashboard` wrapper only ever resets a `_e2e`/`_test` throwaway, never
    # a dev DB. Reachable only inside the runner; never a real DB.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wrightful
          POSTGRES_PASSWORD: wrightful
          POSTGRES_DB: wrightful_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wrightful"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # playwright.dashboard.config.ts references @wrightful/reporter (streaming
      # dogfood). Playwright resolves every reporter at config-load time, so the
      # reporter's dist/ must exist even on the PR leg where it no-ops.
      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      - name: Run dashboard UI e2e tests
        # `vars.VISUAL_BASELINE_OK` (repo variable) flips visual.spec from
        # skipped to enforced. Inert until a maintainer commits Linux PNG
        # baselines (run `--update-snapshots` once on a Linux runner via
        # workflow_dispatch / `act`, commit the PNGs, then set the var to
        # "1" in repo settings). Until then, visual.spec self-skips.
        #
        # Dogfood: stream this suite's results into the prod Wrightful dashboard
        # on both PRs and push-to-main. Creds come from repo secrets; on fork PRs
        # (where GitHub withholds secrets) both resolve to '' and the reporter
        # no-ops (streaming disabled) rather than failing. The suite still tests
        # against the LOCAL dashboard it boots at :5189 — WRIGHTFUL_URL is only
        # the stream target.
        env:
          WRIGHTFUL_VISUAL_BASELINE_OK: ${{ vars.VISUAL_BASELINE_OK }}
          DATABASE_URL: postgres://wrightful:wrightful@localhost:5432/wrightful_e2e
          WRIGHTFUL_URL: ${{ secrets.WRIGHTFUL_URL }}
          WRIGHTFUL_TOKEN: ${{ secrets.WRIGHTFUL_TOKEN }}
        run: pnpm --filter @wrightful/e2e test:dashboard

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dashboard
          path: packages/e2e/playwright-report
          if-no-files-found: ignore
