name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck CLI
        run: pnpm --filter @greenroom/cli typecheck

      - name: Typecheck Dashboard
        run: pnpm --filter @greenroom/dashboard typecheck

  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run CLI tests
        run: pnpm --filter @greenroom/cli test

      - name: Build CLI
        run: pnpm --filter @greenroom/cli build

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run dashboard tests
        run: pnpm --filter @greenroom/dashboard test

      - name: Generate Drizzle migration
        run: pnpm --filter @greenroom/dashboard db:generate
        env:
          CI: true

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-cli, test-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter @greenroom/e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
