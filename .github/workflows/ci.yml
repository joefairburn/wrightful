name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm format

      - name: Typecheck Dashboard
        run: pnpm --filter @wrightful/dashboard typecheck

      - name: Typecheck Reporter
        run: pnpm --filter @wrightful/reporter typecheck

  test-reporter:
    name: Reporter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run reporter tests
        run: pnpm --filter @wrightful/reporter test

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run dashboard tests
        run: pnpm --filter @wrightful/dashboard test

      - name: Generate Drizzle migration
        run: pnpm --filter @wrightful/dashboard db:generate
        env:
          CI: true

  # Playwright version canary: exercises the reporter against a live dashboard
  # shape (via the dogfood e2e suite). When Renovate bumps @playwright/test,
  # this job surfaces any format / reporter-API incompatibilities early.
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-reporter, test-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
