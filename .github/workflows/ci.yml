name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # The dashboard's tsconfig extends the Void-generated .void/tsconfig.json;
      # generate it before any type-aware lint/typecheck.
      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      - name: Check (format, lint, typecheck)
        run: pnpm check

  test-reporter:
    name: Reporter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # The reporter's wire-contract test imports the dashboard's schemas,
      # whose tsconfig extends .void/tsconfig.json — generate it first.
      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      - name: Run reporter tests with coverage
        run: pnpm --filter @wrightful/reporter test:coverage

      - name: Upload reporter coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reporter
          path: packages/reporter/coverage
          if-no-files-found: ignore

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Prepare Void codegen
        run: pnpm --filter @wrightful/dashboard exec void prepare

      - name: Run dashboard tests with coverage
        run: pnpm --filter @wrightful/dashboard test:coverage

      - name: Upload dashboard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dashboard
          path: apps/dashboard/coverage
          if-no-files-found: ignore

  # Playwright version canary: exercises the reporter against a live dashboard
  # shape (via the dogfood e2e suite). When Renovate bumps @playwright/test,
  # this job surfaces any format / reporter-API incompatibilities early.
  #
  # DISABLED: the e2e dashboard fixtures boot the pre-Void dashboard via
  # .dev.vars/wrangler conventions that no longer exist. Re-enable once the
  # suite is reworked to boot the Void dashboard (apps/dashboard).
  test-e2e:
    name: E2E Tests
    if: false
    runs-on: ubuntu-latest
    needs: [test-reporter, test-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build reporter
        run: pnpm --filter @wrightful/reporter build

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  # Browser-driven UI smoke against a locally booted dashboard. Catches
  # cross-cutting regressions (auth → navigation → run-detail) that the
  # API-level e2e and component RTL tests can't see.
  #
  # DISABLED: same reason as test-e2e — the dashboard-boot fixtures target the
  # pre-Void dashboard. Re-enable once reworked for the Void dashboard.
  test-e2e-ui:
    name: E2E UI Tests (Playwright)
    if: false
    runs-on: ubuntu-latest
    needs: [test-reporter, test-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      - name: Run dashboard UI e2e tests
        # `vars.VISUAL_BASELINE_OK` (repo variable) flips visual.spec from
        # skipped to enforced. Inert until a maintainer commits Linux PNG
        # baselines (run `--update-snapshots` once on a Linux runner via
        # workflow_dispatch / `act`, commit the PNGs, then set the var to
        # "1" in repo settings). Until then, visual.spec self-skips.
        env:
          WRIGHTFUL_VISUAL_BASELINE_OK: ${{ vars.VISUAL_BASELINE_OK }}
        run: pnpm --filter @wrightful/e2e test:dashboard

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dashboard
          path: packages/e2e/playwright-report
          if-no-files-found: ignore
