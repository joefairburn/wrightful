name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm format

      - name: Typecheck CLI
        run: pnpm --filter @wrightful/cli typecheck

      - name: Typecheck Dashboard
        run: pnpm --filter @wrightful/dashboard typecheck

  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run CLI tests
        run: pnpm --filter @wrightful/cli test

      - name: Build CLI
        run: pnpm --filter @wrightful/cli build

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run dashboard tests
        run: pnpm --filter @wrightful/dashboard test

      - name: Generate Drizzle migration
        run: pnpm --filter @wrightful/dashboard db:generate
        env:
          CI: true

  # Playwright version canary: This job generates a real Playwright JSON report
  # and feeds it through the CLI parser → dashboard ingest pipeline. When Renovate
  # bumps @playwright/test and opens a PR, this full flow runs automatically.
  # If Playwright changes the JSON report format, this job will fail — making it
  # the early warning system for format incompatibilities.
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-cli, test-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter @wrightful/e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
